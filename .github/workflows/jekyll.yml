name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      force_reindex:
        description: 'Force re-indexing even if catalog ID unchanged'
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@4a9ddd6f338a97768b8006bf671dfbad383215f4
        with:
          ruby-version: '3.2'
          bundler-cache: true
          cache-version: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Extract catalog ID for cache key
        id: catalog_id
        run: |
          CATALOG_ID=$(grep 'rism_catalog:' _config.yml | sed 's/.*rism_catalog: *//' | tr -d '"' | tr -d "'" | tr '/' '-')
          echo "value=$CATALOG_ID" >> $GITHUB_OUTPUT
          echo "→ Catalog ID: $CATALOG_ID"

      - name: Restore index cache
        id: cache_index
        if: github.event.inputs.force_reindex != 'true'
        uses: actions/cache@v4
        with:
          path: |
            index/index.json
            incipits/
          key: rism-index-${{ steps.catalog_id.outputs.value }}

      - name: Index
        if: steps.cache_index.outputs.cache-hit != 'true' || github.event.inputs.force_reindex == 'true'
        run: bundle exec jekyll load-data
        env:
          JEKYLL_ENV: production

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
