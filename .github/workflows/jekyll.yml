name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      force_reindex:
        description: 'Force re-indexing even if _config.yml unchanged'
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Needed to compare HEAD~1 vs HEAD for changed files

      - name: Setup Ruby
        uses: ruby/setup-ruby@4a9ddd6f338a97768b8006bf671dfbad383215f4
        with:
          ruby-version: '3.2'
          bundler-cache: true
          cache-version: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Check if re-indexing is needed
        id: index_check
        run: |
          # Always index if index file doesn't exist yet
          if [ ! -f "index/index.json" ]; then
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "→ Reason: index/index.json missing, must index"
            exit 0
          fi

          # Always index if manually requested via workflow_dispatch input
          if [ "${{ github.event.inputs.force_reindex }}" = "true" ]; then
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "→ Reason: force_reindex requested manually"
            exit 0
          fi

          # Only index if _config.yml was changed in this push
          if git diff HEAD~1 HEAD --name-only | grep -q '_config.yml'; then
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "→ Reason: _config.yml changed, re-indexing"
          else
            echo "needed=false" >> $GITHUB_OUTPUT
            echo "→ Reason: _config.yml unchanged, skipping indexing"
          fi

      - name: Index
        if: steps.index_check.outputs.needed == 'true'
        run: bundle exec jekyll load-data
        env:
          JEKYLL_ENV: production

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
