<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – RISM Catalogue AndP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: #fff;
      padding: 2.5rem 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      width: 100%;
      max-width: 380px;
    }
    h1 { font-size: 1.4rem; margin-bottom: 1.5rem; color: #333; text-align: center; }
    label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 0.3rem; }
    input {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    button {
      width: 100%;
      padding: 0.7rem;
      background: #3273dc;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #2563c0; }
    .error { color: red; font-size: 0.85rem; margin-top: 0.5rem; text-align: center; display: none; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>RISM Catalogue AndP</h1>
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="username" />
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />
    <button onclick="doLogin()">Login</button>
    <p class="error" id="error-msg">Invalid username or password.</p>
  </div>

  <script>
    // If already logged in, go straight to the site
    if (sessionStorage.getItem('rism_auth') === 'true') {
      window.location.href = '/rism-catalogue-andp/';
    }

    // Define your credentials here
    const VALID_USERS = [
      { username: 'admin', password: 'rism2024' },
      // Add more users as needed:
      // { username: 'user2', password: 'pass2' }
    ];

    function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      const match = VALID_USERS.find(u => u.username === username && u.password === password);

      if (match) {
        sessionStorage.setItem('rism_auth', 'true');
        const redirect = sessionStorage.getItem('rism_redirect') || '/rism-catalogue-andp/';
        sessionStorage.removeItem('rism_redirect');
        window.location.href = redirect;
      } else {
        document.getElementById('error-msg').style.display = 'block';
      }
    }

    // Allow pressing Enter to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
