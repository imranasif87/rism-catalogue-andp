<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – RISM Catalogue AndP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: #fff;
      padding: 2.5rem 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      width: 100%;
      max-width: 380px;
    }
    h1 { font-size: 1.4rem; margin-bottom: 1.5rem; color: #333; text-align: center; }
    label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 0.3rem; }
    input {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    button {
      width: 100%;
      padding: 0.7rem;
      background: #3273dc;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #2563c0; }
    .error { color: red; font-size: 0.85rem; margin-top: 0.5rem; text-align: center; display: none; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>RISM Catalogue Elgar</h1>
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Enter email" autocomplete="username" />
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />
    <button id="loginBtn">Login</button>
    <p class="error" id="error-msg">Invalid email or password.</p>
  </div>

  <script type="module">
    // Import the functions you need from the SDKs you need
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD0uIzpPDKbQ8adXtZ8ygmtp_W0TqRBF3s",
      authDomain: "rism-catalogue.firebaseapp.com",
      projectId: "rism-catalogue",
      storageBucket: "rism-catalogue.firebasestorage.app",
      messagingSenderId: "516935701443",
      appId: "1:516935701443:web:a3ee0cc9a1c1db551de376",
      measurementId: "G-YQELDQ7E26"
    };


    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // If already logged in, go straight to the site
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = '/rism-catalogue-andp/';
      }
    });

    function doLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          // Success! Redirect user
          const redirect = sessionStorage.getItem('rism_redirect') || '/rism-catalogue-andp/';
          sessionStorage.removeItem('rism_redirect');
          window.location.href = redirect;
        })
        .catch((error) => {
          // Failed login
          document.getElementById('error-msg').style.display = 'block';
          console.error("Login failed:", error.message);
        });
    }

    // Attach click event to button
    document.getElementById('loginBtn').addEventListener('click', doLogin);

    // Allow pressing Enter to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
